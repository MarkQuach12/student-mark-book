# Local development profile — runs against Docker Postgres (see docker-compose.yml at repo root)
#
# Quick start:
#   docker compose up -d
#   cd backend && ./mvnw spring-boot:run -Dspring-boot.run.profiles=dev
#
# Host port is 5433 to avoid colliding with a native Windows PostgreSQL install on 5432.
# All values below are safe to commit because they only work against a localhost container.

spring.datasource.url=jdbc:postgresql://localhost:5433/markbook
spring.datasource.username=markbook
spring.datasource.password=markbook

# Let Hibernate build/update the schema from JPA entities locally.
# Production keeps ddl-auto=validate + manual SQL migrations in backend/sql/.
spring.jpa.hibernate.ddl-auto=update

# Seed admin user on first boot
admin.email=admin@markbook.com
admin.password=markquach1234

# Local-only JWT secret (must be >= 32 chars)
jwt.secret=local-dev-jwt-secret-do-not-use-in-prod-32chars

# External integrations are optional for local dev — leave blank unless testing those features.
# Set ANTHROPIC_API_KEY in your shell/IDE run config; never commit a real key here.
anthropic.api-key=${ANTHROPIC_API_KEY:}

