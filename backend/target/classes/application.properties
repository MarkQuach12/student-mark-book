server.port=8080

# Use local profile by default so application-local.properties (Neon credentials) is loaded.
# Override with env SPRING_PROFILES_ACTIVE or --spring.profiles.active when needed.
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

# Neon PostgreSQL (used when not using local profile, e.g. in production with env vars)
spring.datasource.url=jdbc:${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# HikariCP connection pool tuning for Neon
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.keepalive-time=60000
spring.datasource.hikari.idle-timeout=300000

# CORS
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}
